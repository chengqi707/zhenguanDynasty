      checkVersion();
      loadSoundSettings();
      const hasSaveData = loadGame();
      if (!hasSaveData) {
        showDifficultySelect();
      } else {
        gameState.currentEvents = randomEvents(config.eventsPerDay);
        if (bgmEnabled) startBGM();
        logEvent('game_start', { from: 'save' });
        renderAll();
      }
    };

    function showDifficultySelect() {
      const modal = document.getElementById('difficultyModal');
      const content = document.getElementById('difficultyContent');
      const diffs = Object.values(config.difficulties);
      content.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:10px;">
          ${diffs.map(d => `
            <button class="btn btn-secondary" style="text-align:left; padding:12px;" onclick="selectDifficulty('${d.id}')">
              <div style="font-weight:bold; font-size:1rem; color:var(--red); margin-bottom:4px;">${d.name}</div>
              <div style="font-size:0.8rem; color:var(--text-light);">${d.desc}</div>
              <div style="font-size:0.75rem; color:var(--text-light); margin-top:4px;">
                初始稳定度 ${d.stabilityInitial} · 数值系数 ${d.eventMultiplier}x · 通关门槛 ${d.endingThreshold}
              </div>
            </button>
          `).join('')}
        </div>
      `;
      modal.classList.remove('hidden');
    }

    function selectDifficulty(difficultyId) {
      document.getElementById('difficultyModal').classList.add('hidden');
      gameState = createInitialState(difficultyId);
      gameState.currentEvents = randomEvents(config.eventsPerDay);
      try { localStorage.removeItem('lyg_save'); } catch (e) {}
      logEvent('game_start', { from: 'new', difficulty: difficultyId });
      if (bgmEnabled) startBGM();
      renderAll();
    }

    // ==================== 存档系统 V1.2.2 ====================
    function getSaveSlots() {
      try {
        const raw = localStorage.getItem('lyg_save_slots');
        return raw ? JSON.parse(raw) : { auto: null, slot1: null, slot2: null, slot3: null };
      } catch (e) { return { auto: null, slot1: null, slot2: null, slot3: null }; }
    }

    function setSaveSlots(slots) {
      try { localStorage.setItem('lyg_save_slots', JSON.stringify(slots)); } catch (e) {}
    }

    function saveToSlot(slotId, name) {
      const slots = getSaveSlots();
      const saveData = {
        name: name || (slotId === 'auto' ? '自动存档' : '存档位 ' + slotId.replace('slot', '')),
        state: JSON.parse(JSON.stringify(gameState)),
        day: gameState.day,
        difficulty: gameState.difficulty,
        timestamp: new Date().toISOString()
      };
      slots[slotId] = saveData;
      setSaveSlots(slots);
      showToast('已保存到「' + saveData.name + '」');
      renderSaveSlotsUI();
    }

    function loadFromSlot(slotId) {
      const slots = getSaveSlots();
      const slot = slots[slotId];
      if (!slot) { showToast('该存档位为空'); return; }
      if (!confirm('确定要读取「' + slot.name + '」（第' + slot.day + '天）吗？当前进度将被覆盖。')) return;
      gameState = JSON.parse(JSON.stringify(slot.state));
      saveGame();
      renderAll();
      showToast('已读取「' + slot.name + '」');
      closeSettings();
    }

    function deleteSlot(slotId) {
      const slots = getSaveSlots();
      if (!slots[slotId]) return;
      if (!confirm('确定要删除「' + slots[slotId].name + '」吗？')) return;
      slots[slotId] = null;
      setSaveSlots(slots);
      renderSaveSlotsUI();
      showToast('已删除');
    }

    function renderSaveSlotsUI() {
      const container = document.getElementById('saveSlotsContainer');
      if (!container) return;
      const slots = getSaveSlots();
      container.innerHTML = `
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${['auto', 'slot1', 'slot2', 'slot3'].map(id => {
            const slot = slots[id];
            const isAuto = id === 'auto';
            return `
              <div style="border:1px solid var(--gold-light); border-radius:6px; padding:8px; background:#fffef8;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                  <span style="font-weight:bold; font-size:0.85rem;">${isAuto ? '🔄 自动存档' : '💾 存档位 ' + id.replace('slot', '')}</span>
                  ${slot ? `<span style="font-size:0.7rem; color:var(--text-light);">第${slot.day}天 · ${config.difficulties[slot.difficulty]?.name || '未知'}</span>` : '<span style="font-size:0.7rem; color:var(--text-light);">空</span>'}
                </div>
                ${slot ? `
                  <div style="font-size:0.75rem; color:var(--text-light); margin-bottom:6px;">${slot.name}</div>
                  <div style="display:flex; gap:6px;">
                    <button class="btn btn-secondary" style="flex:1; font-size:0.75rem; padding:4px;" onclick="loadFromSlot('${id}')">读取</button>
                    <button class="btn btn-secondary" style="flex:1; font-size:0.75rem; padding:4px;" onclick="deleteSlot('${id}')">删除</button>
                  </div>
                ` : `
                  <button class="btn btn-secondary" style="width:100%; font-size:0.75rem; padding:4px;" onclick="saveToSlot('${id}', prompt('存档名称：', '第' + gameState.day + '天存档'))">保存当前进度</button>
                `}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function autoSaveDaily() {
      saveToSlot('auto', '第' + gameState.day + '天自动存档');
    }

    function checkCrisisAlert() {
      const minFavor = Math.min(...Object.values(gameState.characters).filter(c => !gameState.deceased[Object.keys(gameState.characters).find(k => gameState.characters[k] === c)]).map(c => c.favor));
      if (gameState.stability <= 10 || minFavor <= -80) {
        showCrisisBar();
      } else {
        hideCrisisBar();
      }
    }

    function showCrisisBar() {
      let bar = document.getElementById('crisisBar');
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'crisisBar';
        bar.style.cssText = 'position:fixed; bottom:0; left:0; right:0; background:var(--red); color:#fff; padding:8px; text-align:center; z-index:1000; font-size:0.85rem; display:flex; justify-content:center; align-items:center; gap:10px;';
        document.body.appendChild(bar);
      }
      bar.innerHTML = `
        <span>⚠️ 局势危急！</span>
        <button class="btn" style="padding:4px 10px; font-size:0.75rem; background:#fff; color:var(--red); border:none;" onclick="loadFromSlot('auto')">回档到自动存档</button>
        <button class="btn" style="padding:4px 10px; font-size:0.75rem; background:transparent; color:#fff; border:1px solid #fff;" onclick="hideCrisisBar()">无视风险</button>
      `;
      bar.style.display = 'flex';
    }

    function hideCrisisBar() {
      const bar = document.getElementById('crisisBar');
      if (bar) bar.style.display = 'none';
    }

    // 监听窗口 resize 和 orientationchange，确保横竖屏切换后重新渲染
    let resizeTimer = null;
    function handleResize() {
      if (resizeTimer) clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        renderAll();
      }, 150);
    }
    window.addEventListener('resize', handleResize);
    window.addEventListener('orientationchange', () => {
      setTimeout(handleResize, 200);
    });

    // ==================== V2.1 事件编辑器系统 ====================
    let editorTab = 'court';
    let editorEditingId = null;

    function openEditor() {
      editorTab = 'court';
      editorEditingId = null;
      clearEditorForm();
      renderEditorEventList();
      updateEditorTabs();
      document.getElementById('editorModal').classList.remove('hidden');
    }

    function closeEditor() {
      document.getElementById('editorModal').classList.add('hidden');
      editorEditingId = null;
    }

    function switchEditorTab(tab) {
      editorTab = tab;
      editorEditingId = null;
      clearEditorForm();
      updateEditorTabs();
      renderEditorEventList();
    }

    function updateEditorTabs() {
      document.getElementById('editorTabCourt').classList.toggle('active', editorTab === 'court');
      document.getElementById('editorTabHarem').classList.toggle('active', editorTab === 'harem');
    }

    function getEditorEventsArray() {
      return editorTab === 'court' ? config.events : config.haremEvents;
    }

    function renderEditorEventList() {
      const container = document.getElementById('editorEventList');
      const events = getEditorEventsArray();
      const stages = { early: '贞观初年', middle: '贞观中期', late: '贞观晚年' };

      // 按阶段分组
      const groups = { early: [], middle: [], late: [] };
      events.forEach(e => {
        if (groups[e.stage]) groups[e.stage].push(e);
      });

      let html = '';
      Object.entries(groups).forEach(([stageId, list]) => {
        if (list.length === 0) return;
        html += `<div style="font-weight:bold; font-size:0.85rem; color:var(--red); margin:8px 0 4px 0; padding-left:4px; border-left:3px solid var(--gold);">${stages[stageId]} (${list.length})</div>`;
        list.forEach(event => {
          html += `
            <div class="editor-event-card">
              <div class="editor-event-info">
                <div class="editor-event-title">${escapeHtml(event.title)}<span class="editor-stage-badge">${stages[event.stage]}</span></div>
                <div class="editor-event-meta">ID:${event.id} · ${event.options.length}个选项 · ${escapeHtml(event.desc.substring(0, 30))}${event.desc.length > 30 ? '...' : ''}</div>
              </div>
              <div class="editor-event-actions">
                <button class="editor-btn-small" onclick="editEditorEvent(${event.id})">编辑</button>
                <button class="editor-btn-small danger" onclick="deleteEditorEvent(${event.id})">删除</button>
              </div>
            </div>
          `;
        });
      });

      if (html === '') {
        html = '<p style="text-align:center; color:var(--text-light); font-size:0.85rem; padding:10px;">暂无事件，请添加新事件</p>';
      }
      container.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function addEditorOption() {
      const container = document.getElementById('edOptions');
      const idx = container.children.length;
      if (idx >= 5) {
        alert('最多5个选项');
        return;
      }
      const isHarem = editorTab === 'harem';
      const optionHtml = `
        <div class="editor-option-row" data-idx="${idx}">
          <div class="editor-option-header">
            <span class="editor-option-label">选项 ${String.fromCharCode(65 + idx)}</span>
            <button class="editor-btn-small danger" onclick="removeEditorOption(${idx})">移除</button>
          </div>
          <input type="text" class="ed-opt-text" placeholder="选项文本" style="width:100%; padding:5px; border:1px solid var(--gold-light); border-radius:4px; font-family:inherit; font-size:0.8rem; margin-bottom:4px;">
          <input type="text" class="ed-opt-feedback" placeholder="反馈文本" style="width:100%; padding:5px; border:1px solid var(--gold-light); border-radius:4px; font-family:inherit; font-size:0.8rem; margin-bottom:4px;">
          <div style="font-size:0.75rem; color:var(--text-light); margin-bottom:4px;">效果编辑：</div>
          <div class="editor-effects-grid">
            <div class="editor-effect-input"><span>长孙</span><input type="number" class="ed-eff-changsun" placeholder="0"></div>
            <div class="editor-effect-input"><span>尉迟</span><input type="number" class="ed-eff-yuchi" placeholder="0"></div>
            <div class="editor-effect-input"><span>魏征</span><input type="number" class="ed-eff-weizheng" placeholder="0"></div>
            <div class="editor-effect-input"><span>房玄</span><input type="number" class="ed-eff-fangxuanling" placeholder="0"></div>
            <div class="editor-effect-input"><span>稳定</span><input type="number" class="ed-eff-stability" placeholder="0"></div>
            ${isHarem ? `
            <div class="editor-effect-input"><span>皇后</span><input type="number" class="ed-eff-harem-empress" placeholder="0"></div>
            <div class="editor-effect-input"><span>武氏</span><input type="number" class="ed-eff-harem-wushi" placeholder="0"></div>
            <div class="editor-effect-input"><span>杨妃</span><input type="number" class="ed-eff-harem-yangfei" placeholder="0"></div>
            ` : ''}
          </div>
        </div>
      `;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = optionHtml;
      container.appendChild(wrapper.firstElementChild);
    }

    function removeEditorOption(idx) {
      const container = document.getElementById('edOptions');
      const rows = container.querySelectorAll('.editor-option-row');
      if (rows[idx]) {
        rows[idx].remove();
      }
      // 重新索引
      const remaining = container.querySelectorAll('.editor-option-row');
      remaining.forEach((row, i) => {
        row.dataset.idx = i;
        row.querySelector('.editor-option-label').textContent = '选项 ' + String.fromCharCode(65 + i);
        const btn = row.querySelector('.editor-option-header button');
        btn.setAttribute('onclick', `removeEditorOption(${i})`);
      });
    }

    function clearEditorForm() {
      editorEditingId = null;
      document.getElementById('edTitle').value = '';
      document.getElementById('edStage').value = 'early';
      document.getElementById('edDesc').value = '';
      document.getElementById('edOptions').innerHTML = '';
      // 默认添加2个选项
      addEditorOption();
      addEditorOption();
    }

    function fillEditorForm(event) {
      document.getElementById('edTitle').value = event.title;
      document.getElementById('edStage').value = event.stage;
      document.getElementById('edDesc').value = event.desc;
      document.getElementById('edOptions').innerHTML = '';
      event.options.forEach((opt, idx) => {
        addEditorOption();
        const row = document.getElementById('edOptions').children[idx];
        row.querySelector('.ed-opt-text').value = opt.text || '';
        row.querySelector('.ed-opt-feedback').value = opt.feedback || '';
        const effects = opt.effects || {};
        const setVal = (cls, val) => {
          const el = row.querySelector(cls);
          if (el) el.value = (val !== undefined && val !== null) ? val : '';
        };
        setVal('.ed-eff-changsun', effects.changsun);
        setVal('.ed-eff-yuchi', effects.yuchi);
        setVal('.ed-eff-weizheng', effects.weizheng);
        setVal('.ed-eff-fangxuanling', effects.fangxuanling);
        setVal('.ed-eff-stability', effects.stability);
        if (effects.harem) {
          setVal('.ed-eff-harem-empress', effects.harem.empress);
          setVal('.ed-eff-harem-wushi', effects.harem.wushi);
          setVal('.ed-eff-harem-yangfei', effects.harem.yangfei);
        }
      });
    }

    function editEditorEvent(id) {
      const events = getEditorEventsArray();
      const event = events.find(e => e.id === id);
      if (!event) return;
      editorEditingId = id;
      fillEditorForm(event);
      // 滚动到表单
      document.getElementById('editorForm').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function saveEditorEvent() {
      const title = document.getElementById('edTitle').value.trim();
      const stage = document.getElementById('edStage').value;
      const desc = document.getElementById('edDesc').value.trim();
      if (!title) { alert('请输入事件标题'); return; }
      if (!desc) { alert('请输入事件描述'); return; }

      const rows = document.getElementById('edOptions').querySelectorAll('.editor-option-row');
      if (rows.length < 2) { alert('至少需要2个选项'); return; }

      const options = [];
      const isHarem = editorTab === 'harem';
      for (const row of rows) {
        const text = row.querySelector('.ed-opt-text').value.trim();
        const feedback = row.querySelector('.ed-opt-feedback').value.trim();
        if (!text) { alert('请填写所有选项文本'); return; }
        if (!feedback) { alert('请填写所有反馈文本'); return; }

        const effects = {};
        const getNum = (cls) => {
          const el = row.querySelector(cls);
          const v = el ? parseFloat(el.value) : NaN;
          return isNaN(v) ? undefined : v;
        };
        const changsun = getNum('.ed-eff-changsun');
        const yuchi = getNum('.ed-eff-yuchi');
        const weizheng = getNum('.ed-eff-weizheng');
        const fangxuanling = getNum('.ed-eff-fangxuanling');
        const stability = getNum('.ed-eff-stability');
        if (changsun !== undefined) effects.changsun = changsun;
        if (yuchi !== undefined) effects.yuchi = yuchi;
        if (weizheng !== undefined) effects.weizheng = weizheng;
        if (fangxuanling !== undefined) effects.fangxuanling = fangxuanling;
        if (stability !== undefined) effects.stability = stability;

        if (isHarem) {
          const haremEffects = {};
          const empress = getNum('.ed-eff-harem-empress');
          const wushi = getNum('.ed-eff-harem-wushi');
          const yangfei = getNum('.ed-eff-harem-yangfei');
          if (empress !== undefined) haremEffects.empress = empress;
          if (wushi !== undefined) haremEffects.wushi = wushi;
          if (yangfei !== undefined) haremEffects.yangfei = yangfei;
          if (Object.keys(haremEffects).length > 0) {
            effects.harem = haremEffects;
          }
        }

        options.push({ text, feedback, effects });
      }

      const events = getEditorEventsArray();
      if (editorEditingId) {
        // 编辑现有事件
        const idx = events.findIndex(e => e.id === editorEditingId);
        if (idx >= 0) {
          events[idx] = { ...events[idx], title, stage, desc, options };
          alert('事件已更新');
        }
      } else {
        // 新增事件
        const baseId = editorTab === 'court' ? 1000 : 2000;
        const existingIds = events.map(e => e.id).filter(id => id >= baseId && id < baseId + 1000);
        const newId = existingIds.length > 0 ? Math.max(...existingIds) + 1 : baseId;
        events.push({ id: newId, stage, title, desc, options });
        alert('事件已添加，ID: ' + newId);
      }

      editorEditingId = null;
      clearEditorForm();
      renderEditorEventList();
    }

    function deleteEditorEvent(id) {
      if (!confirm('确定要删除此事件吗？')) return;
      const events = getEditorEventsArray();
      const idx = events.findIndex(e => e.id === id);
      if (idx >= 0) {
        events.splice(idx, 1);
        if (editorEditingId === id) {
          editorEditingId = null;
          clearEditorForm();
        }
        renderEditorEventList();
      }
    }

    function testEditorEvent() {
      const title = document.getElementById('edTitle').value.trim();
      const stage = document.getElementById('edStage').value;
      const desc = document.getElementById('edDesc').value.trim();
      if (!title || !desc) { alert('请先填写标题和描述'); return; }

      const rows = document.getElementById('edOptions').querySelectorAll('.editor-option-row');
      if (rows.length < 2) { alert('至少需要2个选项'); return; }

      const options = [];
      const isHarem = editorTab === 'harem';
      for (const row of rows) {
        const text = row.querySelector('.ed-opt-text').value.trim();
        const feedback = row.querySelector('.ed-opt-feedback').value.trim();
        if (!text || !feedback) continue;
        const effects = {};
        const getNum = (cls) => {
          const el = row.querySelector(cls);
          const v = el ? parseFloat(el.value) : NaN;
          return isNaN(v) ? undefined : v;
        };
        const changsun = getNum('.ed-eff-changsun');
        const yuchi = getNum('.ed-eff-yuchi');
        const weizheng = getNum('.ed-eff-weizheng');
        const fangxuanling = getNum('.ed-eff-fangxuanling');
        const stability = getNum('.ed-eff-stability');
        if (changsun !== undefined) effects.changsun = changsun;
        if (yuchi !== undefined) effects.yuchi = yuchi;
        if (weizheng !== undefined) effects.weizheng = weizheng;
        if (fangxuanling !== undefined) effects.fangxuanling = fangxuanling;
        if (stability !== undefined) effects.stability = stability;
        if (isHarem) {
          const haremEffects = {};
          const empress = getNum('.ed-eff-harem-empress');
          const wushi = getNum('.ed-eff-harem-wushi');
          const yangfei = getNum('.ed-eff-harem-yangfei');
          if (empress !== undefined) haremEffects.empress = empress;
          if (wushi !== undefined) haremEffects.wushi = wushi;
          if (yangfei !== undefined) haremEffects.yangfei = yangfei;
          if (Object.keys(haremEffects).length > 0) effects.harem = haremEffects;
        }
        options.push({ text, feedback, effects });
      }

      if (options.length < 2) { alert('有效选项不足2个'); return; }

      const testEvent = { id: -1, title, stage, desc, options };
      closeEditor();

      if (isHarem) {
        gameState.currentHaremEvent = testEvent;
        gameState.haremEventDone = false;
        renderHaremEvent();
      } else {
        gameState.currentEvents = [testEvent];
        gameState.eventIndex = 0;
        renderEvent();
      }
      renderHeader();
      renderCharacters();
      alert('测试事件已触发！处理完此事件后可继续正常游戏。');
    }

    function exportEvents() {
      const data = {
        version: config.version,
        exportTime: new Date().toISOString(),
        events: config.events,
        haremEvents: config.haremEvents
      };
      const text = JSON.stringify(data, null, 2);
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lingyange_events_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('事件配置已导出');
    }

    function importEventsPrompt() {
      const text = prompt('请粘贴事件 JSON 内容（或使用文件输入）：');
      if (!text) return;
      try {
        const data = JSON.parse(text);
        if (data.events && Array.isArray(data.events)) {
          if (confirm(`导入将覆盖 ${data.events.length} 个朝堂事件，确认吗？`)) {
            config.events = data.events;
          }
        }
        if (data.haremEvents && Array.isArray(data.haremEvents)) {
          if (confirm(`导入将覆盖 ${data.haremEvents.length} 个后宫事件，确认吗？`)) {
            config.haremEvents = data.haremEvents;
          }
        }
        renderEditorEventList();
        alert('导入完成');
      } catch (e) {
        alert('JSON 格式错误：' + e.message);
      }
    }

    function resetEvents() {
      if (!confirm('确定要恢复默认事件配置吗？所有自定义事件将丢失。')) return;
      if (config.defaultEvents) {
        config.events = JSON.parse(JSON.stringify(config.defaultEvents));
      }
      if (config.defaultHaremEvents) {
        config.haremEvents = JSON.parse(JSON.stringify(config.defaultHaremEvents));
      }
      editorEditingId = null;
      clearEditorForm();
      renderEditorEventList();
      alert('已恢复默认事件配置');
    }
  </script>
</body>
</html>
